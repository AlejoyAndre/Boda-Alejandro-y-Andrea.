<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Andrea y Alejandro</title>
    <style>
        /* Estilos Generales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #113322;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida (Intro Overlay) */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b2216;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }
        #intro-overlay img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
        .click-to-enter {
            position: absolute;
            bottom: 10%;
            background: rgba(255, 255, 255, 0.9);
            color: #113322;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Contenedor Principal */
        .invitation-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            background: #fffdf9;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .card-section {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .card-section img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Contador Regresivo */
        .countdown-container {
            background: #fffdf9;
            padding: 30px 10px;
            text-align: center;
            color: #bc964a;
        }
        .countdown-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #113322;
            font-weight: 600;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .time-block {
            background: #113322;
            color: #fffdf9;
            padding: 12px 10px;
            border-radius: 8px;
            min-width: 72px;
            border: 1px solid #bc964a;
        }
        .time-block span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .time-block label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Capas Interactivas Invisibles (Links sobre botones) */
        .btn-overlay {
            position: absolute;
            z-index: 10;
            text-decoration: none;
            cursor: pointer;
            /* background: rgba(255, 0, 0, 0.4); /* Pista: Descomenta esta línea si quieres ver los recuadros en rojo para probarlos */
        }

        /* Botón Waze (Lado izquierdo del botón verde en 'happy toguether.png') */
        .btn-location-waze {
            bottom: 3.2%;
            left: 23%;
            width: 27%;
            height: 5.5%;
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
        }

        /* Botón Maps (Lado derecho del botón verde en 'happy toguether.png') */
        .btn-location-maps {
            bottom: 3.2%;
            left: 50%;
            width: 27%;
            height: 5.5%;
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        /* Botón Confirmar Asistencia en 'lluvia de sobres.png' */
        .btn-rsvp {
            bottom: 12.8%;
            left: 20%;
            width: 60%;
            height: 6.2%;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-overlay" onclick="startInvitacion()">
        <img src="portada.png" onerror="this.src='portada.PNG'" alt="Portada Invitación">
        <div class="click-to-enter">Toca para abrir la invitación 🎵</div>
    </div>

    <div class="invitation-container">

        <div class="card-section">
            <img src="portada.png" onerror="this.src='portada.PNG'" alt="Portada">
        </div>

        <div class="card-section">
            <img src="fecha.png" onerror="this.src='fecha.PNG'" alt="Fecha y Lugar">
        </div>

        <div class="countdown-container">
            <div class="countdown-title">Faltan muy pocos días</div>
            <div class="countdown">
                <div class="time-block"><span id="days">00</span><label>Días</label></div>
                <div class="time-block"><span id="hours">00</span><label>Horas</label></div>
                <div class="time-block"><span id="minutes">00</span><label>Min</label></div>
                <div class="time-block"><span id="seconds">00</span><label>Seg</label></div>
            </div>
        </div>

        <div class="card-section">
            <img src="happy toguether.png" onerror="this.src='happy toguether.PNG'" alt="Happy Together">
            
            <a href="https://ul.waze.com/ul?venue_id=187301936.1872888291.12610359&overview=yes&utm_campaign=default&utm_source=waze_website&utm_medium=lm_share_location" target="_blank" class="btn-overlay btn-location-waze" title="Ir con Waze"></a>
            
            <a href="https://www.google.com/maps/search/?api=1&query=Hacienda+Absalon" target="_blank" class="btn-overlay btn-location-maps" title="Ir con Google Maps"></a>
        </div>

        <div class="card-section">
            <img src="codigo.png" onerror="this.src='codigo.PNG'" alt="Código de Vestimenta">
        </div>

        <div class="card-section">
            <img src="lluvia de sobres.png" onerror="this.src='lluvia de sobres.PNG'" alt="Lluvia de sobres">
            
            <a href="https://forms.google.com/TU_LINK_DE_FORMS_AQUI" target="_blank" class="btn-overlay btn-rsvp" title="Confirmar Asistencia"></a>
        </div>

    </div>

    <script>
        function startInvitacion() {
            const overlay = document.getElementById('intro-overlay');
            const music = document.getElementById('bg-music');
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 1000);
            
            music.play().catch(error => {
                console.log("Audio play prevenido:", error);
            });
        }

        // Cuenta regresiva: 25 de Septiembre de 2026, 3:00 PM (15:00)
        const weddingDate = new Date("Sep 25, 2026 15:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown-container").innerHTML = "<div class='countdown-title' style='font-weight:bold;'>¡Llegó el gran día! 🥂</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);
    </script>
</body>
</html>
